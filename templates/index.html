<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Meditation Generator</title>
</head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px;">
    
    <h1>Create Your Custom Meditation</h1>
    
    {% if error %}
        <div style="color: #d8000c; padding: 10px; border: 1px solid #d8000c; background-color: #ffbaba; margin-bottom: 20px; border-radius: 5px;">
            <strong>{{ error }}</strong>
        </div>
    {% endif %}
    <form action="/" method="POST">
        
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px;"><strong>Age Range:</strong></label>
            <select name="age" required style="width: 100%; padding: 8px;">
                <option value="" disabled selected>Select your age range...</option>
                <option value="13-15">13–15</option>
                <option value="16-18">16–18</option>
            </select>
        </div>

        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px;"><strong>Current Mood:</strong></label>
            <select name="mood" required style="width: 100%; padding: 8px;">
                <option value="" disabled selected>How are you feeling?</option>
                <option value="anxious">Anxious</option>
                <option value="stressed">Stressed</option>
                <option value="tired">Tired</option>
                <option value="okay">Just Okay</option>
            </select>
        </div>

        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px;"><strong>What's on your mind?</strong></label>
            <select name="context" required style="width: 100%; padding: 8px;">
                <option value="" disabled selected>Select an academic context...</option>
                <option value="exam soon">Exam Soon</option>
                <option value="big project">Big Project</option>
                <option value="general study">General Studying</option>
            </select>
        </div>

        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px;"><strong>Meditation Style:</strong></label>
            <select name="style" required style="width: 100%; padding: 8px;">
                <option value="" disabled selected>Select a style...</option>
                <option value="calm/soothing">Calm & Soothing</option>
                <option value="motivational">Motivational</option>
                <option value="concentration">Concentration</option>
            </select>
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 5px;"><strong>Desired Length:</strong></label>
            <select name="length" required style="width: 100%; padding: 8px;">
                <option value="" disabled selected>Select length...</option>
                <option value="5">5 Minutes</option>
                <option value="10">10 Minutes</option>
            </select>
        </div>

        <button type="submit" style="padding: 10px 20px; background-color: #007BFF; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px;">
            Generate Audio
        </button>
    </form>

</body>
</html>
