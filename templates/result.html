<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Meditation is Ready</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background-color: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 26px;
        }
        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }
        audio {
            width: 100%;
            margin-bottom: 30px;
            border-radius: 8px;
        }
        .btn-download {
            display: block;
            width: 100%;
            padding: 15px;
            background: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            transition: background-color 0.2s, transform 0.2s;
            box-sizing: border-box;
        }
        .btn-download:hover {
            background: #45a049;
            transform: translateY(-2px);
        }
        .back-link {
            display: inline-block;
            color: #74ebd5;
            text-decoration: none;
            font-weight: 700;
            margin-top: 25px;
            transition: color 0.2s;
        }
        .back-link:hover {
            color: #9face6;
        }
        hr {
            border: 0;
            height: 1px;
            background: #eee;
            margin: 30px 0 0 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Take a deep breath...</h1>
        <p>Your custom meditation is ready to go.</p>

        <audio id="voice-player" controls>
            <source src="{{ url_for('static', filename='audio/' + audio_file) }}" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>

        <audio id="bgm-player" loop>
            <source src="{{ url_for('static', filename='bgm/ambient.mp3') }}" type="audio/mpeg">
        </audio>

        <a href="{{ url_for('static', filename='audio/' + audio_file) }}" download class="btn-download">
            Download Voice Audio (.mp3)
        </a>

        <hr>
        
        <a href="/" class="back-link">← Create another meditation</a>
    </div>

    <script>
        var voicePlayer = document.getElementById("voice-player");
        var bgmPlayer = document.getElementById("bgm-player");
        
        bgmPlayer.volume = 0.25; 

        voicePlayer.onplay = function() {
            bgmPlayer.play();
        };

        voicePlayer.onpause = function() {
            bgmPlayer.pause();
        };
    </script>
</body>
</html>
